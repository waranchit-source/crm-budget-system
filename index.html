<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRM Space</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        :root {
            --bg-color: #0d0e15;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --accent-1: #00f2fe;
            --accent-2: #fe0979;
            --text-main: #ffffff;
            --text-muted: #a0a0b0;
        }

        * { box-sizing: border-box; font-family: 'Inter', sans-serif; margin: 0; padding: 0; }
        
        body { background: radial-gradient(circle at top left, #1a1b26, var(--bg-color)); color: var(--text-main); min-height: 100vh; overflow-x: hidden; }

        .glass { background: var(--glass-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--glass-border); border-radius: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3); }

        .app-container { display: flex; height: 100vh; overflow: hidden; position: relative; }
        
        .mobile-overlay { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.5); backdrop-filter: blur(3px); -webkit-backdrop-filter: blur(3px); z-index: 90; opacity: 0; transition: 0.3s; }
        .mobile-overlay.active { display: block; opacity: 1; }

        .sidebar { width: 80px; height: 100vh; position: fixed; top: 0; left: 0; z-index: 100; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; padding: 20px 10px; overflow-x: hidden; }
        .sidebar.active { width: 260px; padding: 20px; }
        
        .close-sidebar-btn { display: none; }

        .sidebar-brand { font-size: 24px; font-weight: 700; margin-bottom: 40px; text-align: center; white-space: nowrap; opacity: 0; transition: 0.2s; background: -webkit-linear-gradient(45deg, var(--accent-2), var(--accent-1)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .sidebar.active .sidebar-brand { opacity: 1; }
        
        .menu-item { padding: 15px; margin-bottom: 10px; border-radius: 12px; cursor: pointer; transition: 0.3s; color: var(--text-muted); font-weight: 600; display: flex; align-items: center; gap: 15px; white-space: nowrap; }
        .menu-item:hover, .menu-item.active { background: rgba(255,255,255,0.1); color: var(--text-main); }
        .menu-item .icon { font-size: 20px; min-width: 24px; text-align: center; }
        .menu-item .text { opacity: 0; transition: 0.2s; pointer-events: none; }
        .sidebar.active .menu-item .text { opacity: 1; pointer-events: auto; }
        
        .main-content { flex: 1; padding: 20px 40px; height: 100vh; overflow-y: auto; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); margin-left: 80px; width: calc(100% - 80px); }
        .main-content.shifted { margin-left: 260px; width: calc(100% - 260px); }

        .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .hamburger { font-size: 20px; cursor: pointer; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; width: 45px; height: 45px; border-radius: 12px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .hamburger:hover { background: rgba(255,255,255,0.1); }
        
        .lang-toggle { display: flex; align-items: center; background: rgba(255,255,255,0.1); border-radius: 30px; padding: 4px; cursor: pointer; width: 80px; position: relative;}
        .lang-pill { background: linear-gradient(45deg, var(--accent-2), var(--accent-1)); border-radius: 20px; color: white; padding: 4px 10px; font-size: 12px; font-weight: bold; position: absolute; left: 4px; transition: 0.3s; width: 36px; text-align: center;}
        .lang-text { width: 100%; display: flex; justify-content: space-between; padding: 0 10px; font-size: 12px; font-weight: bold; color: var(--text-muted); pointer-events: none;}
        .lang-toggle.th-active .lang-pill { transform: translateX(36px); }

        .auth-wrapper { display: flex; justify-content: center; align-items: center; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; z-index: 50; padding: 20px; }
        .auth-card { width: 100%; max-width: 400px; padding: 40px 30px; }
        .form-group { margin-bottom: 20px; position: relative; }
        .form-group label { display: block; margin-bottom: 8px; font-size: 14px; color: var(--text-muted); }
        .form-control { width: 100%; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px; padding: 12px 15px; color: white; outline: none; transition: 0.3s; }
        .form-control:focus { border-color: var(--accent-1); box-shadow: 0 0 10px rgba(0, 242, 254, 0.2); }
        .pwd-toggle { position: absolute; right: 15px; top: 38px; font-size: 12px; cursor: pointer; color: var(--accent-1); font-weight: bold; }

        .btn-neon { width: 100%; padding: 12px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; color: white; cursor: pointer; background: linear-gradient(45deg, var(--accent-2), var(--accent-1)); background-size: 200% auto; transition: 0.5s; margin-bottom: 15px; }
        .btn-neon:hover { background-position: right center; box-shadow: 0 0 20px rgba(254, 9, 121, 0.4); }
        .btn-outline { background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); }
        .btn-outline:hover { background: rgba(255,255,255,0.05); color: white; }
        
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .info-card { padding: 20px; display: flex; flex-direction: column; justify-content: center; position: relative; overflow: hidden;}
        .info-card::before { content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(circle, rgba(255,255,255,0.05) 0%, transparent 60%); pointer-events: none;}
        .info-label { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px;}
        .info-value { font-size: 20px; font-weight: 700; word-break: break-word;}

        .section-card { padding: 20px; margin-bottom: 30px; overflow-x: auto;}
        .filter-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; align-items: center;}
        select.form-control { width: auto; min-width: 120px; cursor: pointer;}
        
        table { width: 100%; border-collapse: collapse; min-width: 600px;}
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid var(--glass-border); font-size: 13px;}
        th { color: var(--text-muted); font-weight: 600; text-transform: uppercase; font-size: 11px; letter-spacing: 1px;}
        tr:hover td { background: rgba(255,255,255,0.02); }

        .tag-exceed { background: rgba(254, 9, 121, 0.2); color: #fe0979; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold;}
        .tag-safe { background: rgba(0, 242, 254, 0.2); color: #00f2fe; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: bold;}

        .hidden { display: none !important; }
        .text-center { text-align: center; }
        .mb-1 { margin-bottom: 10px; }
        .mb-2 { margin-bottom: 20px; }
        #loader { text-align: center; padding: 40px; color: var(--accent-1); font-weight: bold; letter-spacing: 2px;}

        .chart-container { position: relative; height: 350px; width: 100%; margin-top: 20px;}

        @media (max-width: 768px) {
            .sidebar { width: 260px; transform: translateX(-100%); padding: 20px; }
            .sidebar.active { transform: translateX(0); }
            .main-content { margin-left: 0; width: 100%; padding: 15px; }
            .main-content.shifted { margin-left: 0; width: 100%; }
            .close-sidebar-btn { display: block; position: absolute; top: 15px; right: 20px; background: none; border: none; color: white; font-size: 28px; cursor: pointer; z-index: 101; }
            .dashboard-grid { grid-template-columns: repeat(2, 1fr); }
            .filter-row select.form-control { flex: 1 1 100%; }
        }
        
        @media (max-width: 480px) {
            .dashboard-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div id="authSection" class="auth-wrapper">
        <div class="glass auth-card">
            <h2 id="authTitle" class="text-center mb-2" style="font-size: 28px; font-weight: 700;">Login</h2>
            <div id="authError" class="text-center mb-1" style="color: var(--accent-2); font-size: 14px; min-height: 20px;"></div>
            
            <div class="form-group">
                <label id="lblEmail">Email</label>
                <input type="email" id="email" class="form-control" placeholder="Enter your email">
            </div>
            
            <div class="form-group">
                <label id="lblPassword">Password</label>
                <input type="password" id="password" class="form-control" placeholder="Enter password">
                <span class="pwd-toggle" onclick="togglePassword()">SHOW</span>
            </div>
            
            <div class="form-group" style="display: flex; gap: 10px; align-items: center;" id="rememberGroup">
                <input type="checkbox" id="rememberMe" style="accent-color: var(--accent-1);">
                <label for="rememberMe" id="lblRemember" style="margin: 0;">Remember me</label>
            </div>

            <button class="btn-neon" id="btnLogin" onclick="handleLogin()">Sign In</button>
            <button class="btn-neon btn-outline" id="btnRegisterMode" onclick="switchAuthMode()">Create Account</button>
            <button class="btn-neon hidden" id="btnRegister" onclick="handleRegister()">Register</button>
            <button class="btn-neon btn-outline hidden" id="btnLoginMode" onclick="switchAuthMode()">Back to Login</button>
        </div>
    </div>

    <div id="appSection" class="app-container hidden">
        <div id="mobileOverlay" class="mobile-overlay" onclick="closeSidebarMobile()"></div>
        
        <div id="sidebar" class="sidebar glass">
            <button class="close-sidebar-btn" onclick="closeSidebarMobile()">×</button>
            <div class="sidebar-brand">CRM SPACE</div>
            <div class="menu-item active" onclick="switchTab('userTab', this)">
                <span class="icon">📊</span> <span class="text" id="menuDash">Dashboard</span>
            </div>
            <div id="adminMenuBtn" class="menu-item hidden" onclick="switchTab('adminTab', this)">
                <span class="icon">🛡️</span> <span class="text" id="menuAdmin">Admin Panel</span>
            </div>
            <div style="flex-grow: 1;"></div>
            <div class="menu-item" style="color: var(--accent-2);" onclick="handleLogout()">
                <span class="icon">🚪</span> <span class="text" id="menuLogout">Logout</span>
            </div>
        </div>

        <div class="main-content" id="mainContent">
            <div class="topbar">
                <button class="hamburger" onclick="toggleSidebar()">☰</button>
                <div class="lang-toggle" onclick="toggleLanguage()" id="langToggleBtn">
                    <div class="lang-text"><span>EN</span><span>TH</span></div>
                    <div class="lang-pill" id="langPill">EN</div>
                </div>
            </div>

            <div id="loader" class="hidden">SYNCING DATA...</div>

            <div id="userTab">
                <div class="dashboard-grid">
                    <div class="glass info-card"><div class="info-label" id="lblPName">Member Name</div><div class="info-value" id="pName">-</div></div>
                    <div class="glass info-card"><div class="info-label" id="lblPPhone">Phone Number</div><div class="info-value" id="pPhone">-</div></div>
                    <div class="glass info-card"><div class="info-label" id="lblPBudget">Total Budget</div><div class="info-value" id="pBudget" style="color: var(--accent-1);">-</div></div>
                    <div class="glass info-card"><div class="info-label" id="lblPUsed">Amount Used</div><div class="info-value" id="pUsed" style="color: var(--accent-2);">-</div></div>
                    <div class="glass info-card"><div class="info-label" id="lblPTeam">Team</div><div class="info-value" id="pTeam">-</div></div>
                </div>

                <div class="glass section-card">
                    <h3 class="mb-2" id="titleHistory">Transaction History</h3>
                    <div class="filter-row">
                        <select id="filterMonth" class="form-control" onchange="renderHistory()">
                            <option value="all" id="optMonthAll">All Months</option>
                            <option value="0">January</option><option value="1">February</option>
                            <option value="2">March</option><option value="3">April</option>
                            <option value="4">May</option><option value="5">June</option>
                            <option value="6">July</option><option value="7">August</option>
                            <option value="8">September</option><option value="9">October</option>
                            <option value="10">November</option><option value="11">December</option>
                        </select>
                        <select id="filterYear" class="form-control" onchange="renderHistory()">
                            <option value="all" id="optYearAll">All Years</option>
                            <option value="2026">2026</option><option value="2025">2025</option>
                        </select>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th id="thDate">Date & Time</th>
                                    <th id="thName">Name</th>
                                    <th id="thPhone">Phone</th>
                                    <th id="thPoints">Points</th>
                                    <th id="thBranch">Branch</th>
                                </tr>
                            </thead>
                            <tbody id="historyBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>

            <div id="adminTab" class="hidden">
                <div class="glass section-card mb-2">
                    <h3 class="mb-1" id="titleChart">Budget Usage Overview</h3>
                    <div class="filter-row">
                        <select id="adminChartMonth" class="form-control" onchange="renderChart()">
                            <option value="all" id="optChartMonthAll">All Months</option>
                            <option value="0">January</option><option value="1">February</option>
                            <option value="2">March</option><option value="3">April</option>
                            <option value="4">May</option><option value="5">June</option>
                            <option value="6">July</option><option value="7">August</option>
                            <option value="8">September</option><option value="9">October</option>
                            <option value="10">November</option><option value="11">December</option>
                        </select>
                        <select id="adminChartYear" class="form-control" onchange="renderChart()">
                            <option value="all" id="optChartYearAll">All Years</option>
                            <option value="2026">2026</option><option value="2025">2025</option>
                        </select>
                        <select id="adminChartTeam" class="form-control" onchange="renderChart()">
                            <option value="all" id="optChartTeamAll">All Teams</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="budgetChart"></canvas>
                    </div>
                </div>

                <div class="glass section-card">
                    <h3 class="mb-2" id="titleAdminTable">Employee Management</h3>
                    <div class="filter-row">
                        <select id="adminTableMonth" class="form-control" onchange="renderAdminTable()">
                            <option value="all" id="optAdMonthAll">All Months</option>
                            <option value="0">January</option><option value="1">February</option>
                            <option value="2">March</option><option value="3">April</option>
                            <option value="4">May</option><option value="5">June</option>
                            <option value="6">July</option><option value="7">August</option>
                            <option value="8">September</option><option value="9">October</option>
                            <option value="10">November</option><option value="11">December</option>
                        </select>
                        <select id="adminTableYear" class="form-control" onchange="renderAdminTable()">
                            <option value="all" id="optAdYearAll">All Years</option>
                            <option value="2026">2026</option><option value="2025">2025</option>
                        </select>
                        <select id="adminTableTeam" class="form-control" onchange="renderAdminTable()">
                            <option value="all" id="optAdTeamAll">All Teams</option>
                        </select>
                    </div>
                    <div style="overflow-x: auto;">
                        <table>
                            <thead>
                                <tr>
                                    <th id="thAdName">Employee</th>
                                    <th id="thAdBudget">Budget</th>
                                    <th id="thAdUsed">Used</th>
                                    <th id="thAdStatus">Status</th>
                                    <th id="thAdTeam">Team Setup</th>
                                </tr>
                            </thead>
                            <tbody id="adminBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzS6Y6Uw0gWRJA5fabM7C2C61dL1YZ5nfUR0GZpHtkAjQHCjnpE_7dScce_hFaad86e/exec"; 
        
        let isLoginMode = true;
        let currentLang = 'en';
        let allTransactions = [];
        let adminData = { users: [], allTransactions: [] };
        let teamList = [];
        let currentUserEmail = "";
        let budgetChartInstance = null;

        const shortMonths = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

        const langData = {
            en: {
                login: "Login", register: "Register", email: "Email", pwd: "Password", remember: "Remember me",
                btnIn: "Sign In", btnRegMode: "Create Account", btnReg: "Register", btnBack: "Back to Login",
                menuDash: "Dashboard", menuAdmin: "Admin Panel", menuLog: "Logout",
                plName: "Member Name", plPhone: "Phone Number", plBudget: "Total Budget", plUsed: "Amount Used", plTeam: "Team",
                hisTitle: "Transaction History", allM: "All Months", allY: "All Years", allT: "All Teams",
                thDate: "Date & Time", thName: "Name", thPhone: "Phone", thPoints: "Points", thBranch: "Branch",
                adminTitle: "Budget Usage Overview", mngTitle: "Employee Management",
                thAdName: "Employee", thAdBudget: "Budget", thAdUsed: "Used", thAdStatus: "Status", thAdTeam: "Team Setup",
                noData: "No data found.", btnSave: "Save", exceed: "EXCEEDED", safe: "SAFE"
            },
            th: {
                login: "เข้าสู่ระบบ", register: "สมัครสมาชิก", email: "อีเมล", pwd: "รหัสผ่าน", remember: "จดจำบัญชี",
                btnIn: "เข้าสู่ระบบ", btnRegMode: "สร้างบัญชีใหม่", btnReg: "ยืนยันสมัครสมาชิก", btnBack: "กลับไปหน้าเข้าสู่ระบบ",
                menuDash: "แดชบอร์ดหลัก", menuAdmin: "จัดการระบบ (Admin)", menuLog: "ออกจากระบบ",
                plName: "ชื่อสมาชิก", plPhone: "เบอร์โทรศัพท์", plBudget: "โควต้างบประมาณ", plUsed: "ยอดที่ใช้ไป", plTeam: "ทีม",
                hisTitle: "ประวัติการทำรายการ", allM: "ทุกเดือน", allY: "ทุกปี", allT: "ทุกทีม",
                thDate: "วันที่และเวลา", thName: "ชื่อสมาชิก", thPhone: "เบอร์โทรศัพท์", thPoints: "จำนวนคะแนน", thBranch: "ชื่อสาขา",
                adminTitle: "กราฟสรุปการใช้งบประมาณ", mngTitle: "จัดการข้อมูลพนักงาน",
                thAdName: "พนักงาน", thAdBudget: "งบประมาณ", thAdUsed: "ใช้ไป", thAdStatus: "สถานะ", thAdTeam: "ตั้งค่าทีม",
                noData: "ไม่พบข้อมูล", btnSave: "บันทึก", exceed: "เกินงบ", safe: "ปกติ"
            }
        };

        window.onload = () => {
            if(window.innerWidth > 768) {
                document.getElementById('sidebar').classList.add('active');
                document.getElementById('mainContent').classList.add('shifted');
            }
            const savedE = localStorage.getItem('crm_e');
            const savedP = localStorage.getItem('crm_p');
            if(savedE && savedP) {
                document.getElementById('email').value = savedE;
                document.getElementById('password').value = savedP;
                document.getElementById('rememberMe').checked = true;
                handleLogin();
            }
        };

        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            const mc = document.getElementById('mainContent');
            const ov = document.getElementById('mobileOverlay');
            
            if (window.innerWidth > 768) {
                sb.classList.toggle('active');
                mc.classList.toggle('shifted');
            } else {
                sb.classList.add('active');
                ov.classList.add('active');
            }
        }

        function closeSidebarMobile() {
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.remove('active');
                document.getElementById('mobileOverlay').classList.remove('active');
            }
        }

        function switchTab(tabId, el) {
            document.getElementById('userTab').classList.add('hidden');
            document.getElementById('adminTab').classList.add('hidden');
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.menu-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            
            closeSidebarMobile(); 
            resetFiltersToCurrentMonth();
            if(tabId === 'userTab') renderHistory();
            if(tabId === 'adminTab') { renderAdminTable(); renderChart(); }
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'th' : 'en';
            const t = document.getElementById('langToggleBtn');
            const pill = document.getElementById('langPill');
            if(currentLang === 'th') { t.classList.add('th-active'); pill.innerText = 'TH'; }
            else { t.classList.remove('th-active'); pill.innerText = 'EN'; }
            applyLanguage();
        }

        function applyLanguage() {
            const d = langData[currentLang];
            document.getElementById('authTitle').innerText = isLoginMode ? d.login : d.register;
            document.getElementById('lblEmail').innerText = d.email;
            document.getElementById('lblPassword').innerText = d.pwd;
            document.getElementById('lblRemember').innerText = d.remember;
            document.getElementById('btnLogin').innerText = d.btnIn;
            document.getElementById('btnRegisterMode').innerText = d.btnRegMode;
            document.getElementById('btnRegister').innerText = d.btnReg;
            document.getElementById('btnLoginMode').innerText = d.btnBack;
            document.getElementById('menuDash').innerText = d.menuDash;
            document.getElementById('menuAdmin').innerText = d.menuAdmin;
            document.getElementById('menuLogout').innerText = d.menuLog;
            document.getElementById('lblPName').innerText = d.plName;
            document.getElementById('lblPPhone').innerText = d.plPhone;
            document.getElementById('lblPBudget').innerText = d.plBudget;
            document.getElementById('lblPUsed').innerText = d.plUsed;
            document.getElementById('lblPTeam').innerText = d.plTeam;
            document.getElementById('titleHistory').innerText = d.hisTitle;
            
            document.getElementById('optMonthAll').innerText = d.allM;
            document.getElementById('optYearAll').innerText = d.allY;
            document.getElementById('optChartMonthAll').innerText = d.allM;
            document.getElementById('optChartYearAll').innerText = d.allY;
            document.getElementById('optChartTeamAll').innerText = d.allT;
            document.getElementById('optAdMonthAll').innerText = d.allM;
            document.getElementById('optAdYearAll').innerText = d.allY;
            document.getElementById('optAdTeamAll').innerText = d.allT;

            document.getElementById('thDate').innerText = d.thDate;
            document.getElementById('thName').innerText = d.thName;
            document.getElementById('thPhone').innerText = d.thPhone;
            document.getElementById('thPoints').innerText = d.thPoints;
            document.getElementById('thBranch').innerText = d.thBranch;
            document.getElementById('titleChart').innerText = d.adminTitle;
            document.getElementById('titleAdminTable').innerText = d.mngTitle;
            document.getElementById('thAdName').innerText = d.thAdName;
            document.getElementById('thAdBudget').innerText = d.thAdBudget;
            document.getElementById('thAdUsed').innerText = d.thAdUsed;
            document.getElementById('thAdStatus').innerText = d.thAdStatus;
            document.getElementById('thAdTeam').innerText = d.thAdTeam;

            if(allTransactions.length) renderHistory();
            if(adminData.users.length) { renderAdminTable(); renderChart(); }
        }

        function togglePassword() {
            const p = document.getElementById('password');
            p.type = p.type === "password" ? "text" : "password";
        }

        function switchAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('btnLogin').classList.toggle('hidden');
            document.getElementById('btnRegisterMode').classList.toggle('hidden');
            document.getElementById('btnRegister').classList.toggle('hidden');
            document.getElementById('btnLoginMode').classList.toggle('hidden');
            document.getElementById('rememberGroup').classList.toggle('hidden');
            document.getElementById('authError').innerText = "";
            applyLanguage();
        }

        function msg(text) { document.getElementById('authError').innerText = text; }

        async function fetchAPI(action, data) {
            try {
                const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify({ action, data }), headers: { 'Content-Type': 'text/plain;charset=utf-8' } });
                return await res.json();
            } catch (e) { return { status: "error", message: "Network Error" }; }
        }

        async function handleRegister() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            if(!e || !p) return msg("Please fill all fields");
            msg("Processing...");
            const res = await fetchAPI("register", { email: e, password: p });
            if(res.status === "success") { msg("Success! Please Login"); setTimeout(switchAuthMode, 1500); }
            else msg(res.message);
        }

        async function handleLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            const rm = document.getElementById('rememberMe').checked;
            if(!e || !p) return msg("Please fill all fields");
            msg("Authenticating...");
            const res = await fetchAPI("login", { email: e, password: p });
            if(res.status === "success") {
                if(rm) { localStorage.setItem('crm_e', e); localStorage.setItem('crm_p', p); }
                else { localStorage.removeItem('crm_e'); localStorage.removeItem('crm_p'); }
                currentUserEmail = e;
                loadApp(e, res.role);
            } else msg(res.message);
        }

        function handleLogout() {
            localStorage.removeItem('crm_e'); localStorage.removeItem('crm_p');
            location.reload();
        }

        function populateTeamDropdowns() {
            const chartSel = document.getElementById('adminChartTeam');
            const tblSel = document.getElementById('adminTableTeam');
            const dStr = langData[currentLang];
            chartSel.innerHTML = `<option value="all" id="optChartTeamAll">${dStr.allT}</option>`;
            tblSel.innerHTML = `<option value="all" id="optAdTeamAll">${dStr.allT}</option>`;
            teamList.forEach(t => {
                chartSel.innerHTML += `<option value="${t}">${t}</option>`;
                tblSel.innerHTML += `<option value="${t}">${t}</option>`;
            });
        }

        function resetFiltersToCurrentMonth() {
            const now = new Date();
            const m = now.getMonth().toString();
            const y = now.getFullYear().toString();
            
            document.getElementById('filterMonth').value = m;
            document.getElementById('filterYear').value = y;
            document.getElementById('adminChartMonth').value = m;
            document.getElementById('adminChartYear').value = y;
            document.getElementById('adminTableMonth').value = m;
            document.getElementById('adminTableYear').value = y;
        }

        function isMatchMonthTag(monthTag, mFilter, yFilter) {
            if (!monthTag) return false;
            let mMatch = true; let yMatch = true;
            if (mFilter !== "all") {
                const mStr = shortMonths[parseInt(mFilter)];
                mMatch = monthTag.startsWith(mStr);
            }
            if (yFilter !== "all") {
                const yStr = yFilter.substring(2);
                yMatch = monthTag.endsWith(yStr);
            }
            return mMatch && yMatch;
        }

        async function loadApp(email, role) {
            document.getElementById('authSection').classList.add('hidden');
            document.getElementById('appSection').classList.remove('hidden');
            document.getElementById('loader').classList.remove('hidden');

            const res = await fetchAPI("getDashboard", { email: email });
            document.getElementById('loader').classList.add('hidden');

            if(res.status === "success" && res.data) {
                teamList = res.data.teams || [];
                populateTeamDropdowns();

                const p = res.data.profile;
                document.getElementById('pName').innerText = p.name || "-";
                document.getElementById('pPhone').innerText = p.phone || "-";
                document.getElementById('pTeam').innerText = p.team || "-";
                document.getElementById('pBudget').innerText = p.budget ? Number(p.budget).toLocaleString() : "-";
                
                allTransactions = res.data.transactions || [];
                
                resetFiltersToCurrentMonth();
                renderHistory();

                if(res.data.role === "Admin" && res.data.adminStats) {
                    document.getElementById('adminMenuBtn').classList.remove('hidden');
                    adminData = res.data.adminStats;
                    renderAdminTable();
                    renderChart();
                }
            }
        }

        function renderHistory() {
            const tbody = document.getElementById('historyBody');
            const mFilter = document.getElementById('filterMonth').value;
            const yFilter = document.getElementById('filterYear').value;
            const dStr = langData[currentLang];
            tbody.innerHTML = "";
            let totalUsed = 0;

            const filtered = allTransactions.filter(item => {
                const match = isMatchMonthTag(item.monthTag, mFilter, yFilter);
                if(match) totalUsed += Number(item.points || 0);
                return match;
            }).sort((a,b) => a.sortValue - b.sortValue); 

            document.getElementById('pUsed').innerText = totalUsed.toLocaleString();

            if(filtered.length === 0) {
                tbody.innerHTML = `<tr><td colspan="5" class="text-center">${dStr.noData}</td></tr>`;
                return;
            }

            filtered.forEach(i => {
                tbody.innerHTML += `<tr>
                    <td>${i.displayDate}</td><td>${i.name||'-'}</td><td>${i.phone||'-'}</td>
                    <td style="color:var(--accent-1); font-weight:bold;">${i.points?Number(i.points).toLocaleString():'-'}</td>
                    <td>${i.branch||'-'}</td>
                </tr>`;
            });
        }

        function renderAdminTable() {
            const tbody = document.getElementById('adminBody');
            const mFilter = document.getElementById('adminTableMonth').value;
            const yFilter = document.getElementById('adminTableYear').value;
            const tFilter = document.getElementById('adminTableTeam').value;
            const dStr = langData[currentLang];
            tbody.innerHTML = "";
            
            adminData.users.forEach(u => {
                if (tFilter !== "all" && u.team !== tFilter) return;

                let monthUsed = 0;
                adminData.allTransactions.forEach(t => {
                    if (t.email === u.email && isMatchMonthTag(t.monthTag, mFilter, yFilter)) {
                        monthUsed += Number(t.points || 0);
                    }
                });

                const isExceed = monthUsed > u.budget;
                const statusTag = isExceed ? `<span class="tag-exceed">${dStr.exceed}</span>` : `<span class="tag-safe">${dStr.safe}</span>`;
                const safeEmail = u.email.replace(/'/g, "\\'");
                
                let selectOptions = `<option value="-">-</option>`;
                teamList.forEach(t => {
                    selectOptions += `<option value="${t}" ${u.team === t ? 'selected' : ''}>${t}</option>`;
                });

                tbody.innerHTML += `<tr>
                    <td><div><b>${u.name}</b></div><div style="font-size:11px;color:var(--text-muted);">${u.email}</div></td>
                    <td>${Number(u.budget).toLocaleString()}</td>
                    <td style="color: ${isExceed ? 'var(--accent-2)' : 'white'}; font-weight:bold;">${Number(monthUsed).toLocaleString()}</td>
                    <td>${statusTag}</td>
                    <td>
                        <div style="display:flex; gap:10px;">
                            <select id="team_${u.email}" class="form-control" style="padding:6px; min-width: 120px;">${selectOptions}</select>
                            <button class="btn-neon" style="margin:0; padding:6px 12px; width:auto; font-size:12px;" onclick="saveTeam('${safeEmail}')">${dStr.btnSave}</button>
                        </div>
                    </td>
                </tr>`;
            });
        }

        async function saveTeam(email) {
            const newTeam = document.getElementById(`team_${email}`).value;
            const btn = event.target;
            btn.innerText = "...";
            const res = await fetchAPI("updateTeam", { adminEmail: currentUserEmail, targetEmail: email, newTeam: newTeam });
            btn.innerText = langData[currentLang].btnSave;
            if(res.status === "success") {
                const uIndex = adminData.users.findIndex(u => u.email === email);
                if(uIndex > -1) adminData.users[uIndex].team = newTeam;
                alert(res.message);
                renderChart();
            }
            else alert(res.message);
        }

        function renderChart() {
            const mFilter = document.getElementById('adminChartMonth').value;
            const yFilter = document.getElementById('adminChartYear').value;
            const tFilter = document.getElementById('adminChartTeam').value;
            const ctx = document.getElementById('budgetChart').getContext('2d');
            if(budgetChartInstance) budgetChartInstance.destroy();
            
            const filteredUsers = adminData.users.filter(u => tFilter === "all" || u.team === tFilter);
            
            const labels = [];
            const budgetLine = [];
            const usedBars = [];

            filteredUsers.forEach(u => {
                labels.push(u.name.split(' ')[0]);
                budgetLine.push(u.budget);
                let totalUsed = 0;
                adminData.allTransactions.forEach(t => {
                    if(t.email === u.email && isMatchMonthTag(t.monthTag, mFilter, yFilter)) {
                        totalUsed += Number(t.points || 0);
                    }
                });
                usedBars.push(totalUsed);
            });

            budgetChartInstance = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: labels,
                    datasets: [
                        { type: 'bar', label: currentLang==='th'?'ยอดรวมที่ใช้ไปทั้งหมด':'Total Used Amount', data: usedBars, backgroundColor: '#fe0979', borderRadius: 6 },
                        { type: 'line', label: currentLang==='th'?'เส้นงบประมาณ (โควต้า)':'Budget Limit', data: budgetLine, borderColor: '#00f2fe', backgroundColor: '#00f2fe', borderWidth: 2, borderDash: [5, 5], tension: 0.3, fill: false }
                    ]
                },
                options: {
                    responsive: true, maintainAspectRatio: false, color: '#a0a0b0',
                    scales: { y: { grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#a0a0b0' } }, x: { grid: { display: false }, ticks: { color: '#a0a0b0' } } },
                    plugins: { legend: { labels: { color: '#ffffff' } } }
                }
            });
        }
    </script>
</body>
</html>
